apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-chatbot
data:
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  MAX_TOKENS: "2048"
  ENABLE_THINKING: "false"
  EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "documents"
  DATA_DIR: "/app/data"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"
  TOP_K: "5"
  SCORE_THRESHOLD: "0.3"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "*"
  RAG_API_URL: "http://rag-api:8000"
# Secrets (ANTHROPIC_API_KEY, APP_API_KEYS, RAG_API_KEY) live in the
# 'rag-secrets' Secret, created by the CD workflow from GitHub secrets.
