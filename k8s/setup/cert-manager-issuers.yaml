# Let's Encrypt ClusterIssuers (require cert-manager to be installed first).
#
# One-time cluster setup — NOT applied by CD (CD runs `kubectl apply -f k8s/`,
# which is non-recursive and skips this subdirectory).
#
# BEFORE APPLYING: replace <YOUR_EMAIL> with a real address (Let's Encrypt sends
# expiry notices there). Then:
#   kubectl apply -f k8s/setup/cert-manager-issuers.yaml
#
# Use 'letsencrypt-staging' while testing (untrusted, but generous rate limits),
# then switch the ingress annotation to 'letsencrypt-prod' for a trusted cert.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: <YOUR_EMAIL>
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <YOUR_EMAIL>
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
