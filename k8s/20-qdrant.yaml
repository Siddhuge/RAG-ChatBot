apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: rag-chatbot
spec:
  clusterIP: None # headless — single Qdrant pod
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: rag-chatbot
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.5
          ports:
            - containerPort: 6333
            - containerPort: 6334
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          readinessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
