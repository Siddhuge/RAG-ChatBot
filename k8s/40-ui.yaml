apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ui
  namespace: rag-chatbot
  labels:
    app: rag-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-ui
  template:
    metadata:
      labels:
        app: rag-ui
    spec:
      containers:
        - name: ui
          image: siddhuge/rag-chatbot:latest
          imagePullPolicy: Always
          command:
            ["streamlit", "run", "ui/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rag-ui
  namespace: rag-chatbot
spec:
  # ClusterIP: the UI is exposed publicly through the NGINX Ingress (HTTPS),
  # not its own LoadBalancer. See k8s/60-ingress.yaml + k8s/INGRESS-SETUP.md.
  type: ClusterIP
  selector:
    app: rag-ui
  ports:
    - port: 80
      targetPort: 8501
