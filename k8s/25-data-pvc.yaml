apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data
  namespace: rag-chatbot
spec:
  # ReadWriteOnce is fine for a single API replica (Azure managed-disk default
  # storage class). For multiple API replicas, switch to an azurefile (RWX)
  # storage class so the volume can mount on several nodes.
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
