# Deploy on ANY machine without the source code.
#
# This pulls the published image from Docker Hub instead of building locally.
# You only need this file + a .env file on the target machine.
#
# Usage:
#   export DOCKERHUB_USERNAME=your-dockerhub-username
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d
#
# (DOCKERHUB_USERNAME may also be set in the .env file.)

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/rag-chatbot:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  ui:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/rag-chatbot:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      RAG_API_URL: http://api:8000
    env_file:
      - .env
    command:
      - streamlit
      - run
      - ui/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501

volumes:
  qdrant_storage:
