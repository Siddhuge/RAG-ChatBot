services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # Qdrant's readiness endpoint; the image ships a shell but no curl, so use bash /dev/tcp.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Override .env values for the compose network.
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
    env_file:
      - .env
    volumes:
      # Mount your documents so /v1/ingest can read them.
      - ./data:/app/data

  ui:
    build: .
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      # The UI talks to the API over the compose network.
      RAG_API_URL: http://api:8000
    env_file:
      # Picks up RAG_API_KEY if you set one (needed when APP_API_KEYS is set).
      - .env
    command:
      - streamlit
      - run
      - ui/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501

volumes:
  qdrant_storage:
