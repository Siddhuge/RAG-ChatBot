name: CI/CD

# Build, test, and publish the RAG Chatbot image to Docker Hub.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (NOT your password)
#                       create at: hub.docker.com → Account Settings → Security
#
# The image is published as:  <DOCKERHUB_USERNAME>/rag-chatbot
#   - push to main      -> tags: latest, main, <short-sha>
#   - push tag v1.2.3   -> tags: 1.2.3, 1.2, <short-sha>
#   - pull requests      -> build only, no push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Diagnose credential problems clearly (never prints the values).
      - name: Verify Docker Hub secrets
        if: github.event_name != 'pull_request'
        env:
          U: ${{ secrets.DOCKERHUB_USERNAME }}
          T: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$U" ] || { echo "::error::DOCKERHUB_USERNAME secret is empty/unset — check the secret NAME is exactly DOCKERHUB_USERNAME"; exit 1; }
          [ -n "$T" ] || { echo "::error::DOCKERHUB_TOKEN secret is empty/unset — check the secret NAME is exactly DOCKERHUB_TOKEN"; exit 1; }
          if printf '%s' "$U" | grep -q '[[:space:]]'; then echo "::error::DOCKERHUB_USERNAME contains whitespace/newline — recreate the secret"; exit 1; fi
          if printf '%s' "$T" | grep -q '[[:space:]]'; then echo "::error::DOCKERHUB_TOKEN contains whitespace/newline — recreate the secret (this causes 'malformed Authorization header')"; exit 1; fi
          echo "Secrets present and clean (username chars: ${#U}, token chars: ${#T})"

      # Only authenticate when we intend to push (skips on PRs).
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/rag-chatbot
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
