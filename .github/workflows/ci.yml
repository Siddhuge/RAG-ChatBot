name: CI/CD

# Test + security scan, then build/scan/publish the image to Docker Hub.
# Secrets required: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (a Docker Hub access token).

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rag-chatbot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: |
          pip install --upgrade pip
          pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secrets (Gitleaks)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect -s /repo -c /repo/.gitleaks.toml --redact --exit-code 1
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: SAST (Bandit)
        run: pip install bandit && bandit -r app client scripts -ll -ii
      - name: Deps & Dockerfile (Trivy)
        run: docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs /repo --scanners vuln,misconfig --severity CRITICAL --ignore-unfixed --exit-code 1 --no-progress

  docker:
    needs: [test, security]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image (Trivy) then push
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest \
            image "$(head -1 <<< '${{ steps.meta.outputs.tags }}')" \
            --severity CRITICAL --ignore-unfixed --exit-code 1 --no-progress
          xargs -rL1 docker push <<< '${{ steps.meta.outputs.tags }}'
