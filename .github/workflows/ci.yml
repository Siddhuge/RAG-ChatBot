name: CI/CD

# Test, security-scan, build, and publish the RAG Chatbot image to Docker Hub.
#
# Pipeline: test  +  security (Gitleaks secrets, Bandit SAST, Trivy fs CVEs)
#           -> docker (build -> Trivy image scan -> push, on push events only)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (NOT your password)
#                       create at: hub.docker.com → Account Settings → Security
#
# The image is published as:  <DOCKERHUB_USERNAME>/rag-chatbot
#   - push to main      -> tags: latest, main, <short-sha>
#   - push tag v1.2.3   -> tags: 1.2.3, 1.2, <short-sha>
#   - pull requests      -> build only, no push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full git history so secret scanning checks every commit

      # 1) Secret scanning — detect committed credentials (current tree + history).
      - name: Secret scan (Gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest detect \
            --source=/repo --config=/repo/.gitleaks.toml \
            --redact --verbose --exit-code=1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 2) Static application security testing of our own Python code.
      - name: SAST (Bandit)
        run: |
          pip install bandit
          bandit -r app client scripts -ll -ii

      # 3) Dependency CVEs + Dockerfile misconfiguration (fails on fixable CRITICALs).
      - name: Dependency & config scan (Trivy filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  docker:
    name: Build, scan & push image
    runs-on: ubuntu-latest
    needs: [test, security]
    # Publish only on pushes to main / version tags (not PRs).
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Trim stray whitespace/newlines from the secrets, then log in.
      # A trailing newline on the token is the classic cause of
      # "malformed HTTP Authorization header" — trimming makes the workflow
      # robust regardless of how the secret was pasted.
      - name: Diagnose & log in to Docker Hub
        id: prep
        env:
          U: ${{ secrets.DOCKERHUB_USERNAME }}
          T: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Unambiguous whitespace strip (CR/LF/tab/space anywhere).
          Uc="${U//[$'\r\n\t ']/}"
          Tc="${T//[$'\r\n\t ']/}"
          # Docker Hub usernames AND image names must be lowercase.
          Uc="${Uc,,}"

          # --- Safe diagnostics: NO secret values are printed, only facts ---
          echo "username length (raw=${#U}, trimmed=${#Uc})"
          echo "token length    (raw=${#T}, trimmed=${#Tc})"
          case "$Uc" in *@*) echo "::warning::DOCKERHUB_USERNAME looks like an EMAIL — use your Docker Hub username, not email";; esac
          case "$Uc" in *[A-Z]*) echo "::warning::DOCKERHUB_USERNAME has UPPERCASE — Docker Hub usernames are lowercase";; esac
          case "$Tc" in
            dckr_pat_*) echo "token format: starts with dckr_pat_ (valid Docker Hub PAT shape)";;
            sk-ant-*)   echo "::error::DOCKERHUB_TOKEN starts with sk-ant- — that's an ANTHROPIC key, not a Docker Hub token";;
            ghp_*|github_pat_*) echo "::error::DOCKERHUB_TOKEN looks like a GitHub token, not a Docker Hub token";;
            *) echo "::warning::DOCKERHUB_TOKEN does NOT start with dckr_pat_ — may be the wrong value or an old-style token";;
          esac
          weird=$(printf '%s' "$Tc" | tr -d 'A-Za-z0-9_-' | wc -c)
          echo "token chars outside [A-Za-z0-9_-]: $weird"

          [ -n "$Uc" ] || { echo "::error::DOCKERHUB_USERNAME secret is empty/unset — check the secret NAME"; exit 1; }
          [ -n "$Tc" ] || { echo "::error::DOCKERHUB_TOKEN secret is empty/unset — check the secret NAME"; exit 1; }

          echo "--- attempting docker login ---"
          printf '%s' "$Tc" | docker login -u "$Uc" --password-stdin
          echo "image=$Uc/rag-chatbot" >> "$GITHUB_OUTPUT"

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and load locally so we can scan BEFORE publishing.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ragchatbot-localscan:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container image scan — fail the build on fixable CRITICAL vulnerabilities
      # so a vulnerable image is never pushed.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ragchatbot-localscan:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # Only reached if the scan passed. Push every derived tag.
      - name: Push image
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pushing $tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
